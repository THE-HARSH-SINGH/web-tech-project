<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page 4 | Calculator</title>
  <style>
    :root {
      --nav: #0f4c81;
      --accent: #1f8a70;
      --accent-dark: #176b58;
      --bg: #f3f8ff;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #64748b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: "Segoe UI", Tahoma, sans-serif;
      margin: 0;
      background: linear-gradient(140deg, #edf5ff, var(--bg));
      color: var(--text);
    }

    .navbar {
      background-color: var(--nav);
      padding: 14px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
    }

    .navbar a {
      color: white;
      text-decoration: none;
      margin: 0 10px;
      font-weight: 600;
      padding: 6px 10px;
      border-radius: 6px;
    }

    .navbar a:hover {
      background: rgba(255, 255, 255, 0.18);
    }

    .container {
      max-width: 980px;
      margin: 24px auto;
      background: var(--card);
      padding: 20px;
      border-radius: 14px;
      box-shadow: 0 10px 28px rgba(17, 24, 39, 0.14);
    }

    .grid {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 18px;
    }

    .card {
      border: 1px solid #dbeafe;
      border-radius: 12px;
      background: #f9fbff;
      padding: 14px;
    }

    .panel-title {
      margin: 0 0 10px;
      color: #0f4c81;
    }

    .calc-expression {
      width: 100%;
      margin-bottom: 8px;
      border: 1px solid #dbe3ef;
      border-radius: 8px;
      background: #f8fbff;
      padding: 8px;
      text-align: right;
      color: var(--muted);
      min-height: 38px;
      font-size: 14px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .calc-display {
      width: 100%;
      font-size: 28px;
      padding: 12px;
      margin-bottom: 10px;
      text-align: right;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      background: #ffffff;
    }

    .calc-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .calc-btn,
    .action-btn {
      border: none;
      border-radius: 8px;
      padding: 10px;
      font-weight: 600;
      cursor: pointer;
      background: var(--accent);
      color: white;
      transition: transform 0.12s ease, background-color 0.2s ease;
    }

    .calc-btn:hover,
    .action-btn:hover {
      background: var(--accent-dark);
      transform: translateY(-1px);
    }

    .operator {
      background: #0f4c81;
    }

    .equal {
      background: #059669;
    }

    .danger {
      background: #dc2626;
    }

    .action-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .info-box {
      min-height: 60px;
      padding: 10px;
      border-radius: 8px;
      border: 1px dashed #93c5fd;
      background: #eff6ff;
      color: #0f172a;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .history-list {
      list-style: none;
      margin: 0;
      padding: 0;
      max-height: 260px;
      overflow: auto;
    }

    .history-list li {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 8px;
      margin-bottom: 6px;
      font-family: Consolas, monospace;
      cursor: pointer;
    }

    .history-list li:hover {
      background: #ecf5ff;
    }

    .keymap {
      margin-top: 10px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #dbeafe;
      background: #f8fbff;
      font-size: 13px;
      color: #475569;
    }

    .buttons {
      margin-top: 20px;
      display: flex;
      justify-content: space-between;
    }

    .buttons a {
      background-color: var(--nav);
      color: white;
      text-decoration: none;
      padding: 10px 14px;
      border-radius: 8px;
    }

    @media (max-width: 820px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="index.html">Home</a>
    <a href="page2.html">Page 2</a>
    <a href="page3.html">Page 3</a>
    <a href="page4.html">Page 4</a>
    <a href="page5.php">Page 5</a>
  </nav>

  <div class="container">
    <h1 id="mainHeading">Calculator</h1>
    <p id="savedUser">Supports +, -, *, /, SQRT, and SQUARE only.</p>

    <div class="grid">
      <section class="card" id="calculatorCard">
        <h2 class="panel-title">Calculator</h2>
        <div class="calc-expression" id="calcExpression">Expression: 0</div>
        <input class="calc-display" id="calcDisplay" type="text" value="0" readonly />

        <div class="calc-grid" id="calcButtons">
          <button class="calc-btn danger" data-value="AC">AC</button>
          <button class="calc-btn danger" data-value="DEL">DEL</button>
          <button class="calc-btn operator" data-value="SQRT">SQRT</button>
          <button class="calc-btn operator" data-value="SQR">X^2</button>

          <button class="calc-btn" data-value="7">7</button>
          <button class="calc-btn" data-value="8">8</button>
          <button class="calc-btn" data-value="9">9</button>
          <button class="calc-btn operator" data-value="/">/</button>

          <button class="calc-btn" data-value="4">4</button>
          <button class="calc-btn" data-value="5">5</button>
          <button class="calc-btn" data-value="6">6</button>
          <button class="calc-btn operator" data-value="*">*</button>

          <button class="calc-btn" data-value="1">1</button>
          <button class="calc-btn" data-value="2">2</button>
          <button class="calc-btn" data-value="3">3</button>
          <button class="calc-btn operator" data-value="-">-</button>

          <button class="calc-btn" data-value="0">0</button>
          <button class="calc-btn" data-value=".">.</button>
          <button class="calc-btn equal" data-value="=">=</button>
          <button class="calc-btn operator" data-value="+">+</button>
        </div>

        <div class="action-row">
          <button class="action-btn" id="inputBtn">Quick Input</button>
        </div>
      </section>

      <section class="card" id="insightCard">
        <h2 class="panel-title">Output</h2>
        <div class="info-box" id="calcStatus">Ready for input.</div>

        <h3 class="panel-title">Recent Results (click to reuse)</h3>
        <ul class="history-list" id="historyList"></ul>
      </section>
    </div>

    <div class="buttons">
      <a href="page3.html">Back</a>
      <a href="page5.php">Next</a>
    </div>
  </div>

  <script src="page4.js"></script>
</body>
</html>
